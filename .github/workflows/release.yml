name: Build and release packages

# Tags release; pushes to main and PRs get the same build + smoke tests so
# breakage surfaces when it lands, not at the next release. Only the
# release job itself is tag-gated.
on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7

      - name: shellcheck every tracked shell script
        run: git ls-files '*.sh' | xargs shellcheck

  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7

      - name: Install fpm and package build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ruby ruby-dev build-essential rpm
          sudo gem install --no-document fpm

      - name: Determine version
        id: version
        # Real version from the tag on release builds; a throwaway
        # 0.0.0.ci<run> version for branch/PR builds.
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=0.0.0.ci${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build packages
        run: ./packaging/build.sh "${{ steps.version.outputs.version }}"

      - name: Sanity-check rpm contents
        run: |
          for f in dist/*.rpm; do
            echo "=== $f ==="
            rpm -qlp "$f"
          done

      - name: Upload packages as a workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: packages
          path: dist/*
          if-no-files-found: error

  smoke-test-ubuntu:
    # GitHub-hosted runners are full VMs with systemd as PID 1 (unlike a
    # container-based CI executor), so we can install the actual built .deb
    # packages, let apt resolve their real Depends: podman, and hit live
    # HTTP endpoints -- this exercises the real shipped artifact, not just
    # the raw install script.
    needs: build
    runs-on: ubuntu-24.04
    # Backstop in addition to --max-time on every curl call: normally this
    # job finishes in a few minutes, so if something hangs (v2.2.0's first
    # run did, on an un-timed-out curl waiting on ipmi-exporter) this caps
    # the damage instead of running for GitHub's default 360-minute limit.
    timeout-minutes: 20
    steps:
      - name: Download packages
        uses: actions/download-artifact@v8
        with:
          name: packages
          path: dist

      - name: Install stack component packages
        # One transaction: apt can't resolve dependencies from local ./*.deb
        # files it wasn't handed, so the metapackage and its components (and
        # metrics-stack-common) all go in together. dpkg unpacks everything
        # before configuring, so alertmanager's postinst finds
        # monitoring-add-exporter (from metrics-stack-prometheus) and
        # auto-registers regardless of configure order.
        run: |
          sudo apt-get update
          sudo apt install -y \
            ./dist/metrics-stack_*.deb \
            ./dist/metrics-stack-common_*.deb \
            ./dist/metrics-stack-prometheus_*.deb \
            ./dist/metrics-stack-alertmanager_*.deb \
            ./dist/metrics-stack-grafana_*.deb

      - name: Install exporter and dashboard packages
        # One transaction; only the stack components have to go first
        # (previous step), so the exporters' postinst finds
        # monitoring-add-exporter and auto-registers. The six leaf packages
        # have no ordering constraints among themselves.
        run: |
          sudo apt install -y ./dist/metrics-stack-exporter-*.deb ./dist/metrics-stack-dashboards-*.deb

      - name: Wait for stack services to become healthy
        run: |
          ok=0
          for i in $(seq 1 60); do
            ok=1
            curl -fsS --max-time 10 http://localhost:9090/-/healthy >/dev/null 2>&1 || ok=0
            curl -fsS --max-time 10 http://localhost:9093/-/healthy >/dev/null 2>&1 || ok=0
            curl -fsS --max-time 10 http://localhost:3000/api/health >/dev/null 2>&1 || ok=0
            [ "$ok" = "1" ] && break
            sleep 3
          done
          if [ "$ok" != "1" ]; then
            echo "base services did not become healthy in time"
            exit 1
          fi

      - name: Check exporter services are active
        run: |
          # systemd-active, not an HTTP /metrics check: smartctl-exporter
          # and (especially) ipmi-exporter depend on real hardware (disks,
          # a BMC) that CI runners don't have. ipmi-exporter in particular
          # can take far longer than any reasonable HTTP timeout to respond
          # when freeipmi is probing a nonexistent IPMI interface -- a
          # prior run confirmed the container itself was healthy
          # (systemctl showed "active (running)") the whole time an HTTP
          # check against it kept failing. Whether the container process
          # started and stayed up is what packaging/postinstall.sh is
          # actually responsible for; whether it can talk to real hardware
          # is not something CI on commodity runners can test.
          for svc in node-exporter smartctl-exporter ipmi-exporter; do
            ok=0
            for i in $(seq 1 10); do
              systemctl is-active --quiet "$svc" && { ok=1; break; }
              sleep 2
            done
            if [ "$ok" != "1" ]; then
              echo "$svc is not active"
              systemctl status "$svc" --no-pager || true
              exit 1
            fi
            echo "$svc is active"
          done

      - name: Check exporters auto-registered and non-hardware targets are up
        run: |
          # Retries for up to ~75s: file_sd's refresh_interval is 30s, plus
          # a scrape_interval (15s) before a newly-registered target shows up.
          #
          # ipmi is only checked for registration, not health=='up': even a
          # real Prometheus (default scrape_timeout: 10s) would mark it down
          # on a host with no actual BMC, since freeipmi's probe of a
          # nonexistent IPMI interface can take far longer than that to
          # fail. That's a real hardware-dependent characteristic, not a
          # packaging bug -- what CI can and should verify is that the
          # postinstall auto-registration wired it into targets.d correctly.
          success=0
          for i in $(seq 1 15); do
            result="$(curl -fsS --max-time 10 http://localhost:9090/api/v1/targets)"
            if echo "$result" | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          active = data['data']['activeTargets']
          for t in active:
              print(t['scrapePool'], t['labels'].get('job'), t['scrapeUrl'], t['health'], t.get('lastError') or '')
          # scrapePool is always the scrape_config's job_name ('file-sd' for
          # every file_sd-discovered target) -- the per-exporter job name
          # set by monitoring-add-exporter's 'labels: {job: ...}' shows up
          # in the resolved labels, not scrapePool.
          jobs = {t['labels'].get('job') for t in active}
          assert 'alertmanager' in jobs, 'alertmanager did not auto-register into targets.d'
          assert 'node' in jobs, 'node-exporter did not auto-register into targets.d'
          assert 'smartctl' in jobs, 'smartctl-exporter did not auto-register into targets.d'
          assert 'ipmi' in jobs, 'ipmi-exporter did not auto-register into targets.d'
          non_ipmi = [t for t in active if t['labels'].get('job') != 'ipmi']
          non_ipmi_up = [t for t in non_ipmi if t['health'] == 'up']
          print(f'{len(non_ipmi_up)}/{len(non_ipmi)} non-ipmi targets up, jobs: {sorted(jobs)}')
          assert len(non_ipmi_up) == len(non_ipmi), 'a non-ipmi target is not up'
          "; then
              success=1
              break
            fi
            echo "not all targets registered/up yet, retrying..."
            sleep 5
          done
          if [ "$success" != "1" ]; then
            echo "targets did not all become healthy within the retry window"
            exit 1
          fi

      - name: Check Prometheus alerting rules loaded
        run: |
          curl -fsS --max-time 10 http://localhost:9090/api/v1/rules | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          groups = data['data']['groups']
          total = sum(len(g['rules']) for g in groups)
          print(f'{len(groups)} rule groups, {total} rules loaded')
          assert total >= 8, f'expected at least 8 rules, got {total}'
          "

      - name: Check starter dashboards were provisioned
        run: |
          # Grafana's file-based dashboard provider polls every 30s
          # (updateIntervalSeconds: 30 in provisioning/dashboards/local.yml),
          # so retry rather than checking once right after install.
          success=0
          for i in $(seq 1 15); do
            result="$(curl -fsS --max-time 10 -u admin:admin "http://localhost:3000/api/search")"
            if echo "$result" | python3 -c "
          import json, sys
          results = json.load(sys.stdin)
          titles = [r.get('title', '') for r in results]
          print(titles)
          assert any('Node Overview' in t for t in titles), 'node-overview dashboard not found'
          assert any('Node CPU' in t for t in titles), 'node-cpu dashboard not found'
          assert any('Node Memory' in t for t in titles), 'node-memory dashboard not found'
          assert any('Node Network' in t for t in titles), 'node-network dashboard not found'
          assert any('Node Disk' in t for t in titles), 'node-disk dashboard not found'
          assert any('smartctl Overview' in t for t in titles), 'smartctl-overview dashboard not found'
          assert any('IPMI Overview' in t for t in titles), 'ipmi-overview dashboard not found'
          "; then
              success=1
              break
            fi
            echo "dashboards not provisioned yet, retrying..."
            sleep 5
          done
          if [ "$success" != "1" ]; then
            echo "starter dashboards were not provisioned within the retry window"
            exit 1
          fi

      - name: Enable Alertmanager clustering and confirm it holds, then disable
        run: |
          # 192.0.2.10 is TEST-NET-1: guaranteed-unreachable, which is fine --
          # gossip keeps retrying peers; what packaging is responsible for is
          # that the service comes up clustered and stays active.
          sudo monitoring-configure-cluster --advertise 127.0.0.1 192.0.2.10 || true
          systemctl is-active --quiet alertmanager || { echo "alertmanager not active after cluster enable"; exit 1; }
          # Prove the entrypoint indirection worked: the running alertmanager
          # process must actually carry the flags from cluster.args.
          sudo podman exec alertmanager sh -c 'tr "\0" " " < /proc/1/cmdline' | grep -q -- '--cluster.peer=192.0.2.10:9094' \
            || { echo "running alertmanager is missing the --cluster.peer flag"; exit 1; }
          # Gossip port published on the host (tcp; ss can't show the udp
          # listener state as LISTEN, so tcp is the observable signal).
          ss -ltn | grep -q ':9094 ' || { echo "9094 not listening after cluster enable"; ss -ltn; exit 1; }
          # The API reports a cluster in settling/ready state with this node
          # as a peer once gossip is up; retry while it settles.
          ok=0
          for i in $(seq 1 15); do
            if curl -fsS --max-time 10 http://localhost:9093/api/v2/status | python3 -c "
          import json, sys
          cluster = json.load(sys.stdin)['cluster']
          assert cluster.get('status') in ('ready', 'settling'), cluster
          print('cluster status:', cluster['status'])
          "; then ok=1; break; fi
            sleep 2
          done
          [ "$ok" = "1" ] || { echo "alertmanager never reported cluster status"; exit 1; }
          # Prometheus fans out to the local instance AND the peer via
          # alertmanagers.d (file_sd refresh is 30s -- retry).
          ok=0
          for i in $(seq 1 15); do
            if curl -fsS --max-time 10 http://localhost:9090/api/v1/alertmanagers | python3 -c "
          import json, sys
          data = json.load(sys.stdin)['data']
          urls = [am['url'] for am in data['activeAlertmanagers'] + data['droppedAlertmanagers']]
          print(urls)
          assert any('alertmanager:9093' in u for u in urls), 'local alertmanager not discovered'
          assert any('192.0.2.10:9093' in u for u in urls), 'cluster peer not discovered'
          "; then ok=1; break; fi
            sleep 5
          done
          [ "$ok" = "1" ] || { echo "prometheus did not discover both alertmanagers"; exit 1; }
          # Disable restores standalone operation and cleans up.
          sudo monitoring-configure-cluster --disable
          systemctl is-active --quiet alertmanager || { echo "alertmanager not active after cluster disable"; exit 1; }
          [ ! -f /etc/alertmanager/cluster.args ] || { echo "cluster.args not removed on disable"; exit 1; }
          [ ! -f /etc/prometheus/alertmanagers.d/peers.yml ] || { echo "peers.yml not removed on disable"; exit 1; }

      - name: Reinstall packages and confirm the upgrade path leaves them running
        run: |
          # apt install --reinstall drives the same maintainer-script sequence
          # as an upgrade (prerm "upgrade" -> unpack -> postinst "configure"),
          # so this regression-tests the preremove scripts' upgrade guard:
          # services must still be running and the alertmanager/exporter
          # targets still registered afterward, not stopped/deregistered by
          # the old package's prerm.
          sudo apt install -y --reinstall \
            ./dist/metrics-stack-common_*.deb \
            ./dist/metrics-stack-prometheus_*.deb \
            ./dist/metrics-stack-alertmanager_*.deb \
            ./dist/metrics-stack-grafana_*.deb
          sudo apt install -y --reinstall ./dist/metrics-stack-exporter-node_*.deb
          for svc in prometheus alertmanager grafana node-exporter; do
            if ! systemctl is-active --quiet "$svc"; then
              echo "$svc is not active after reinstall"
              systemctl status "$svc" --no-pager || true
              exit 1
            fi
          done
          for target in node alertmanager; do
            if [ ! -f "/etc/prometheus/targets.d/$target.yml" ]; then
              echo "$target.yml target file went missing across a reinstall"
              exit 1
            fi
          done

      - name: Uninstall an exporter and confirm target cleanup
        run: |
          # purge, not remove: the Quadlet .container file ships as a dpkg
          # conffile, and plain `apt remove` deliberately leaves conffiles
          # on disk (standard Debian semantics), which keeps the generated
          # unit defined. Only purge deletes it -- after which the postrm
          # daemon-reload must leave no trace of the unit. (dnf remove
          # deletes config files outright, so rpm has no equivalent split.)
          sudo apt purge -y metrics-stack-exporter-node
          if [ -f /etc/prometheus/targets.d/node.yml ]; then
            echo "node.yml target file was not cleaned up on removal"
            exit 1
          fi
          # The postrm daemon-reload should leave no stale Quadlet-generated
          # unit behind once the .container file is gone.
          if systemctl cat node-exporter.service >/dev/null 2>&1; then
            echo "node-exporter.service still known to systemd after removal"
            exit 1
          fi

      - name: Uninstall Alertmanager and confirm the rest of the stack is unaffected
        run: |
          # The point of the package split: removing one component leaves the
          # others running. Purge the metapackage too (it depends on
          # metrics-stack-alertmanager, so removing the component alone would
          # take the metapackage with it anyway -- doing it explicitly keeps
          # apt from prompting about it).
          sudo apt purge -y metrics-stack metrics-stack-alertmanager
          if [ -f /etc/prometheus/targets.d/alertmanager.yml ]; then
            echo "alertmanager.yml target file was not cleaned up on removal"
            exit 1
          fi
          if [ -f /etc/prometheus/alertmanagers.d/local.yml ]; then
            echo "alertmanagers.d/local.yml was not cleaned up on removal"
            exit 1
          fi
          if systemctl cat alertmanager.service >/dev/null 2>&1; then
            echo "alertmanager.service still known to systemd after removal"
            exit 1
          fi
          curl -fsS --max-time 10 http://localhost:9090/-/healthy >/dev/null
          curl -fsS --max-time 10 http://localhost:3000/api/health >/dev/null
          echo "prometheus and grafana still healthy without alertmanager"

      - name: Dump logs on failure
        if: failure()
        run: |
          for svc in metrics-network prometheus alertmanager grafana node-exporter smartctl-exporter ipmi-exporter; do
            echo "=== $svc ==="
            sudo systemctl status "$svc" --no-pager || true
            sudo journalctl -u "$svc" --no-pager | tail -50 || true
          done

  smoke-test-rocky:
    # Runs in parallel with smoke-test-ubuntu (both only need: build), not
    # instead of it -- .deb and .rpm are validated independently.
    #
    # Scope is deliberately narrower than the Ubuntu lane: this runs inside
    # a plain rockylinux:9 container, which has no systemd as PID 1 (unlike
    # the Ubuntu job, which runs directly on a full VM runner). The %post
    # scriptlet's systemctl calls would fail immediately under its `set -e`
    # before testing anything else -- that failure mode is identical for a
    # correct package and a broken one, so it isn't a meaningful signal.
    # Installing with --setopt=tsflags=noscripts skips scriptlet execution
    # entirely and validates what a container-based job *can* meaningfully
    # check: real dnf dependency resolution (Requires: podman against a
    # real EL9 AppStream repo), that all 11 packages install together
    # without file conflicts, correct file placement/permissions, and that
    # %config(noreplace) markers landed on the right files. It does not
    # cover service startup, exporter auto-registration, or SELinux
    # labeling -- catching those on real EL9 would need an actual systemd
    # environment (nested KVM or a self-hosted runner), which is a bigger
    # step to take only if this lighter check turns up a reason to.
    needs: build
    runs-on: ubuntu-24.04
    container:
      image: rockylinux:9
    timeout-minutes: 10
    steps:
      - name: Download packages
        uses: actions/download-artifact@v8
        with:
          name: packages
          path: dist

      - name: Install all packages (dependency + file-manifest check only)
        run: |
          dnf install -y --setopt=tsflags=noscripts ./dist/*.noarch.rpm

      - name: Confirm every package is recorded as installed
        run: |
          rpm -q metrics-stack \
            metrics-stack-common \
            metrics-stack-prometheus \
            metrics-stack-alertmanager \
            metrics-stack-grafana \
            metrics-stack-exporter-node \
            metrics-stack-exporter-smartctl \
            metrics-stack-exporter-ipmi \
            metrics-stack-dashboards-node \
            metrics-stack-dashboards-smartctl \
            metrics-stack-dashboards-ipmi

      - name: Confirm key files landed with correct permissions
        run: |
          test -f /etc/containers/systemd/prometheus.container
          test -f /etc/containers/systemd/node-exporter.container
          test -f /usr/bin/monitoring-add-exporter
          test -f /usr/bin/monitoring-configure-cluster
          test -x /etc/alertmanager/entrypoint.sh
          test -f /etc/prometheus/alertmanagers.d/README.md
          test -f /var/lib/grafana/dashboards/node-overview.json
          test -f /var/lib/grafana/dashboards/node-cpu.json
          test -f /var/lib/grafana/dashboards/node-memory.json
          test -f /var/lib/grafana/dashboards/node-network.json
          test -f /var/lib/grafana/dashboards/node-disk.json
          mode="$(stat -c '%a' /etc/alertmanager/alertmanager.yml)"
          [ "$mode" = "640" ] || { echo "alertmanager.yml is mode $mode, expected 640"; exit 1; }

      - name: Confirm %config(noreplace) markers landed
        run: |
          configfiles="$(rpm -q --configfiles metrics-stack-prometheus metrics-stack-alertmanager)"
          echo "$configfiles"
          echo "$configfiles" | grep -qF /etc/alertmanager/alertmanager.yml
          echo "$configfiles" | grep -qF /etc/prometheus/prometheus.yml

      - name: Dump state on failure
        if: failure()
        run: |
          echo "=== installed metrics-stack packages ==="
          rpm -qa | grep metrics-stack || echo "none installed"
          echo "=== dnf history ==="
          dnf history list || true

  release:
    # Only tag pushes publish a release; branch/PR runs stop after the
    # smoke tests.
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [lint, smoke-test-ubuntu, smoke-test-rocky]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Download packages
        uses: actions/download-artifact@v8
        with:
          name: packages
          path: dist

      - name: Upload release assets
        # Third-party action pinned by commit SHA (v3.0.2) rather than a
        # movable tag. v3 targets the Node 24 Actions runtime (v2 targeted
        # the deprecated Node 20 and warned on every release).
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          files: dist/*
          fail_on_unmatched_files: true
