name: Build and release packages

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install fpm and package build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ruby ruby-dev build-essential rpm
          sudo gem install --no-document fpm

      - name: Determine version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build packages
        run: ./packaging/build.sh "${{ steps.version.outputs.version }}"

      - name: Sanity-check rpm contents
        run: |
          for f in dist/*.rpm; do
            echo "=== $f ==="
            rpm -qlp "$f"
          done

      - name: Upload packages as a workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: packages
          path: dist/*
          if-no-files-found: error

  smoke-test:
    # GitHub-hosted runners are full VMs with systemd as PID 1 (unlike a
    # container-based CI executor), so we can install the actual built .deb
    # packages, let apt resolve their real Depends: podman, and hit live
    # HTTP endpoints -- this exercises the real shipped artifact, not just
    # the raw install script.
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - name: Download packages
        uses: actions/download-artifact@v4
        with:
          name: packages
          path: dist

      - name: Install base package
        run: |
          sudo apt-get update
          sudo apt install -y ./dist/metrics-stack_*.deb

      - name: Install exporter and dashboard packages
        run: |
          sudo apt install -y ./dist/metrics-stack-exporter-node_*.deb
          sudo apt install -y ./dist/metrics-stack-exporter-smartctl_*.deb
          sudo apt install -y ./dist/metrics-stack-exporter-ipmi_*.deb
          sudo apt install -y ./dist/metrics-stack-dashboards-node_*.deb
          sudo apt install -y ./dist/metrics-stack-dashboards-smartctl_*.deb
          sudo apt install -y ./dist/metrics-stack-dashboards-ipmi_*.deb

      - name: Wait for base services to become healthy
        run: |
          ok=0
          for i in $(seq 1 60); do
            ok=1
            curl -fsS http://localhost:9090/-/healthy >/dev/null 2>&1 || ok=0
            curl -fsS http://localhost:9093/-/healthy >/dev/null 2>&1 || ok=0
            curl -fsS http://localhost:3000/api/health >/dev/null 2>&1 || ok=0
            [ "$ok" = "1" ] && break
            sleep 3
          done
          if [ "$ok" != "1" ]; then
            echo "base services did not become healthy in time"
            exit 1
          fi

      - name: Wait for exporters to respond
        run: |
          # ipmi-exporter still serves /metrics on hardware with no real BMC
          # (like this CI runner) -- just with no sensor data -- so a plain
          # 200 is the right bar here, same as smartctl-exporter.
          ok=0
          for i in $(seq 1 30); do
            ok=1
            curl -fsS http://localhost:9100/metrics >/dev/null 2>&1 || ok=0
            curl -fsS http://localhost:9633/metrics >/dev/null 2>&1 || ok=0
            curl -fsS http://localhost:9290/metrics >/dev/null 2>&1 || ok=0
            [ "$ok" = "1" ] && break
            sleep 3
          done
          if [ "$ok" != "1" ]; then
            echo "exporters did not respond in time"
            exit 1
          fi

      - name: Check exporters auto-registered and all targets are up
        run: |
          # Retries for up to ~75s: file_sd's refresh_interval is 30s, plus
          # a scrape_interval (15s) before a newly-registered target shows up.
          success=0
          for i in $(seq 1 15); do
            result="$(curl -fsS http://localhost:9090/api/v1/targets)"
            if echo "$result" | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          active = data['data']['activeTargets']
          for t in active:
              print(t['scrapePool'], t['labels'].get('job'), t['scrapeUrl'], t['health'], t.get('lastError') or '')
          # scrapePool is always the scrape_config's job_name ('file-sd' for
          # every file_sd-discovered target) -- the per-exporter job name
          # set by monitoring-add-exporter's 'labels: {job: ...}' shows up
          # in the resolved labels, not scrapePool.
          jobs = {t['labels'].get('job') for t in active}
          up = [t for t in active if t['health'] == 'up']
          print(f'{len(up)}/{len(active)} targets up, jobs: {sorted(jobs)}')
          assert 'node' in jobs, 'node-exporter did not auto-register into targets.d'
          assert 'smartctl' in jobs, 'smartctl-exporter did not auto-register into targets.d'
          assert 'ipmi' in jobs, 'ipmi-exporter did not auto-register into targets.d'
          assert len(up) == len(active), 'not all targets are up'
          "; then
              success=1
              break
            fi
            echo "not all targets registered/up yet, retrying..."
            sleep 5
          done
          if [ "$success" != "1" ]; then
            echo "targets did not all become healthy within the retry window"
            exit 1
          fi

      - name: Check Prometheus alerting rules loaded
        run: |
          curl -fsS http://localhost:9090/api/v1/rules | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          groups = data['data']['groups']
          total = sum(len(g['rules']) for g in groups)
          print(f'{len(groups)} rule groups, {total} rules loaded')
          assert total >= 8, f'expected at least 8 rules, got {total}'
          "

      - name: Check starter dashboards were provisioned
        run: |
          # Grafana's file-based dashboard provider polls every 30s
          # (updateIntervalSeconds: 30 in provisioning/dashboards/local.yml),
          # so retry rather than checking once right after install.
          success=0
          for i in $(seq 1 15); do
            result="$(curl -fsS -u admin:admin "http://localhost:3000/api/search")"
            if echo "$result" | python3 -c "
          import json, sys
          results = json.load(sys.stdin)
          titles = [r.get('title', '') for r in results]
          print(titles)
          assert any('Node Overview' in t for t in titles), 'node-overview dashboard not found'
          assert any('smartctl Overview' in t for t in titles), 'smartctl-overview dashboard not found'
          assert any('IPMI Overview' in t for t in titles), 'ipmi-overview dashboard not found'
          "; then
              success=1
              break
            fi
            echo "dashboards not provisioned yet, retrying..."
            sleep 5
          done
          if [ "$success" != "1" ]; then
            echo "starter dashboards were not provisioned within the retry window"
            exit 1
          fi

      - name: Uninstall an exporter and confirm target cleanup
        run: |
          sudo apt remove -y metrics-stack-exporter-node
          sleep 2
          if [ -f /etc/prometheus/targets.d/node.yml ]; then
            echo "node.yml target file was not cleaned up on removal"
            exit 1
          fi

      - name: Dump logs on failure
        if: failure()
        run: |
          for svc in metrics-network prometheus alertmanager grafana node-exporter smartctl-exporter ipmi-exporter; do
            echo "=== $svc ==="
            sudo systemctl status "$svc" --no-pager || true
            sudo journalctl -u "$svc" --no-pager | tail -50 || true
          done

  release:
    needs: smoke-test
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Download packages
        uses: actions/download-artifact@v4
        with:
          name: packages
          path: dist

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          fail_on_unmatched_files: true
