# managed by metrics-stack
# Local edits are preserved on reinstall unless --force-config is used.

global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules.d/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - localhost:9093

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: alertmanager
    static_configs:
      - targets: ["localhost:9093"]

  - job_name: node
    static_configs:
      - targets: ["localhost:9100"]

  # Drop-in target discovery: add/remove files under targets.d/ to add or
  # remove exporters without editing this file or restarting Prometheus.
  # See targets.d/README.md and `monitoring-add-exporter --help`.
  - job_name: file-sd
    file_sd_configs:
      - files:
          - /etc/prometheus/targets.d/*.yml
          - /etc/prometheus/targets.d/*.json
        refresh_interval: 30s
