# managed by metrics-stack-alertmanager
# Populate via `monitoring-configure-email` rather than editing by hand where
# possible — it validates and restarts the service for you. CHANGE_ME values
# below are placeholders until email is configured.

global:
  smtp_smarthost: 'CHANGE_ME:587'
  smtp_from: 'CHANGE_ME'
  smtp_auth_username: 'CHANGE_ME'
  smtp_auth_password: 'CHANGE_ME'
  smtp_require_tls: true

route:
  receiver: email
  group_by: ['alertname', 'instance']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

inhibit_rules:
  - source_match:
      alertname: InstanceDown
    target_match_re:
      severity: warning|critical
    equal: ['instance']

receivers:
  - name: email
    email_configs:
      - to: 'CHANGE_ME'
        send_resolved: true
