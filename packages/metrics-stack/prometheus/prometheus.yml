# managed by metrics-stack
# Local edits survive package upgrades: this file ships as
# %config(noreplace) (rpm) / a conffile (deb).

global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules.d/*.yml

alerting:
  alertmanagers:
    - static_configs:
        # 'alertmanager' resolves via the shared 'metrics' Podman network
        # (see packages/metrics-stack/containers/metrics.network).
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: alertmanager
    static_configs:
      - targets: ["alertmanager:9093"]

  # Every exporter -- including this stack's own node_exporter and
  # smartctl_exporter packages -- registers itself here rather than being
  # hardcoded above. Drop-in target discovery: add/remove files under
  # targets.d/ to add or remove exporters without editing this file or
  # restarting Prometheus. See targets.d/README.md and
  # `monitoring-add-exporter --help`.
  - job_name: file-sd
    file_sd_configs:
      - files:
          - /etc/prometheus/targets.d/*.yml
          - /etc/prometheus/targets.d/*.json
        refresh_interval: 30s
