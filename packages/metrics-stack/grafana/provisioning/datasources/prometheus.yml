# managed by metrics-stack
apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    uid: prometheus
    # 'prometheus' resolves via the shared 'metrics' Podman network
    # (see config/containers/metrics.network) -- Grafana and Prometheus
    # run in separate containers.
    url: http://prometheus:9090
    isDefault: true
    editable: true
