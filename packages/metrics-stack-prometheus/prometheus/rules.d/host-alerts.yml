# managed by metrics-stack-prometheus
groups:
  - name: host-alerts
    rules:
      - alert: InstanceDown
        expr: up == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Instance {{ $labels.instance }} down"
          description: "{{ $labels.instance }} (job {{ $labels.job }}) has been unreachable for more than 5 minutes."

      - alert: HostHighCpuUsage
        expr: 100 - (avg by (instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 90
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage on {{ $labels.instance }}"
          description: "CPU usage on {{ $labels.instance }} has been above 90% for 10 minutes (current value: {{ $value | printf \"%.1f\" }}%)."

      - alert: HostOutOfMemory
        expr: (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) * 100 < 10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Host out of memory on {{ $labels.instance }}"
          description: "Available memory on {{ $labels.instance }} is below 10% (current value: {{ $value | printf \"%.1f\" }}%)."

      - alert: HostOutOfDiskSpace
        expr: (node_filesystem_avail_bytes{fstype!~"tmpfs|overlay"} / node_filesystem_size_bytes{fstype!~"tmpfs|overlay"}) * 100 < 10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Low disk space on {{ $labels.instance }} ({{ $labels.mountpoint }})"
          description: "Available disk space on {{ $labels.instance }}:{{ $labels.mountpoint }} is below 10% (current value: {{ $value | printf \"%.1f\" }}%)."

      - alert: HostDiskWillFillIn24Hours
        expr: predict_linear(node_filesystem_avail_bytes{fstype!~"tmpfs|overlay"}[6h], 24 * 3600) < 0
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "Disk will fill within 24h on {{ $labels.instance }} ({{ $labels.mountpoint }})"
          description: "Based on recent trend, {{ $labels.instance }}:{{ $labels.mountpoint }} is projected to run out of space within 24 hours."
