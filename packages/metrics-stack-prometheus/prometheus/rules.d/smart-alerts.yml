# managed by metrics-stack-prometheus
# Disk-health alerts from smartctl_exporter (metrics-stack-exporter-smartctl).
# Inert on stacks without that exporter: no series, no alerts. The
# *Increasing rules use delta() so a drive with a stable historic error
# count doesn't page forever -- only newly accumulating errors fire.
groups:
  - name: smart-alerts
    rules:
      - alert: DiskSmartHealthFailed
        expr: smartctl_device_smart_status == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "SMART health check failed for {{ $labels.device }} on {{ $labels.instance }}"
          description: "Drive {{ $labels.device }} on {{ $labels.instance }} reports SMART overall-health FAILED. Plan replacement now."

      - alert: DiskNvmeCriticalWarning
        expr: smartctl_device_critical_warning > 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "NVMe critical warning on {{ $labels.device }} ({{ $labels.instance }})"
          description: "NVMe drive {{ $labels.device }} on {{ $labels.instance }} has critical warning bits set (value {{ $value }}): spare/temperature/degraded-media/read-only condition."

      - alert: DiskNvmeSpareLow
        expr: smartctl_device_available_spare < on(instance, device) smartctl_device_available_spare_threshold
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "NVMe spare capacity below threshold on {{ $labels.device }} ({{ $labels.instance }})"
          description: "Available spare on {{ $labels.device }} ({{ $labels.instance }}) is {{ $value }}%, below the drive's own threshold. The drive is running out of remapping headroom."

      - alert: DiskNvmeWearHigh
        expr: smartctl_device_percentage_used > 90
        for: 1h
        labels:
          severity: warning
        annotations:
          summary: "NVMe wear above 90% on {{ $labels.device }} ({{ $labels.instance }})"
          description: "NVMe endurance used on {{ $labels.device }} ({{ $labels.instance }}) is {{ $value }}%. Plan replacement."

      - alert: DiskMediaErrorsIncreasing
        expr: delta(smartctl_device_media_errors[6h]) > 0
        labels:
          severity: warning
        annotations:
          summary: "Media errors increasing on {{ $labels.device }} ({{ $labels.instance }})"
          description: "{{ $value }} new media error(s) on {{ $labels.device }} ({{ $labels.instance }}) in the last 6h."

      - alert: DiskAtaSectorsIncreasing
        expr: delta(smartctl_device_attribute{attribute_name=~"Reallocated_Sector_Ct|Current_Pending_Sector", attribute_value_type="raw_value"}[6h]) > 0
        labels:
          severity: warning
        annotations:
          summary: "{{ $labels.attribute_name }} increasing on {{ $labels.device }} ({{ $labels.instance }})"
          description: "{{ $labels.attribute_name }} on {{ $labels.device }} ({{ $labels.instance }}) grew by {{ $value }} in the last 6h -- the classic early sign of a dying ATA/SATA drive."

      - alert: DiskScsiDefectsIncreasing
        expr: delta(smartctl_scsi_grown_defect_list[6h]) > 0
        labels:
          severity: warning
        annotations:
          summary: "SCSI grown defect list increasing on {{ $labels.device }} ({{ $labels.instance }})"
          description: "Grown defect list on SAS/SCSI drive {{ $labels.device }} ({{ $labels.instance }}) grew by {{ $value }} in the last 6h."

      - alert: DiskUncorrectedErrorsIncreasing
        expr: delta(smartctl_read_total_uncorrected_errors[6h]) > 0 or delta(smartctl_write_total_uncorrected_errors[6h]) > 0
        labels:
          severity: warning
        annotations:
          summary: "Uncorrected read/write errors increasing on {{ $labels.device }} ({{ $labels.instance }})"
          description: "{{ $value }} new uncorrected error(s) on {{ $labels.device }} ({{ $labels.instance }}) in the last 6h."

      - alert: DiskTemperatureHigh
        expr: smartctl_device_temperature{temperature_type="current"} > 60
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Drive temperature {{ $value }}C on {{ $labels.device }} ({{ $labels.instance }})"
          description: "{{ $labels.device }} on {{ $labels.instance }} has been above 60C for 15m. Check chassis airflow and fans."
