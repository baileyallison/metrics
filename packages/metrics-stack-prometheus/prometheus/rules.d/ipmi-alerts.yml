# managed by metrics-stack-prometheus
# BMC hardware-sensor alerts from ipmi_exporter (metrics-stack-exporter-ipmi).
# Inert on stacks without that exporter: no series, no alerts. Sensor state
# values: 0 = nominal, 1 = warning, 2 = critical, 3 = N/A -- the rules match
# exact states, so N/A sensors never fire.
groups:
  - name: ipmi-alerts
    rules:
      - alert: IpmiSensorCritical
        expr: (ipmi_temperature_state == 2) or (ipmi_fan_speed_state == 2) or (ipmi_voltage_state == 2) or (ipmi_power_state == 2) or (ipmi_current_state == 2) or (ipmi_sensor_state == 2)
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "IPMI sensor '{{ $labels.name }}' critical on {{ $labels.instance }}"
          description: "BMC sensor '{{ $labels.name }}' (id {{ $labels.id }}) on {{ $labels.instance }} has been in critical state for 5m -- check temperature/fans/power supplies."

      - alert: IpmiSensorWarning
        expr: (ipmi_temperature_state == 1) or (ipmi_fan_speed_state == 1) or (ipmi_voltage_state == 1) or (ipmi_power_state == 1) or (ipmi_current_state == 1) or (ipmi_sensor_state == 1)
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "IPMI sensor '{{ $labels.name }}' in warning state on {{ $labels.instance }}"
          description: "BMC sensor '{{ $labels.name }}' (id {{ $labels.id }}) on {{ $labels.instance }} has been in warning state for 15m."

      - alert: IpmiCollectorDown
        # Fires when the exporter can't talk to the local BMC. On hardware
        # without a BMC (VMs, desktops) this stays firing -- don't install
        # metrics-stack-exporter-ipmi on such hosts.
        expr: ipmi_up == 0
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "IPMI collector failing on {{ $labels.instance }}"
          description: "ipmi_exporter on {{ $labels.instance }} has been unable to read the BMC (collector {{ $labels.collector }}) for 30m."
