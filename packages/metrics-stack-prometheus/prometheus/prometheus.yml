# managed by metrics-stack-prometheus
# Local edits survive package upgrades: this file ships as
# %config(noreplace) (rpm) / a conffile (deb).

global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules.d/*.yml

alerting:
  # Alertmanager instances are drop-in files, mirroring the targets.d
  # pattern below: the metrics-stack-alertmanager package registers the
  # local instance (local.yml), and monitoring-configure-cluster registers
  # HA cluster peers (peers.yml) so alerts fan out to every cluster member.
  # See alertmanagers.d/README.md. An empty directory is harmless -- alerts
  # just have nowhere to go until an Alertmanager registers.
  alertmanagers:
    - file_sd_configs:
        - files:
            - /etc/prometheus/alertmanagers.d/*.yml
          refresh_interval: 30s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # Every other stack component -- Alertmanager and every exporter,
  # including this stack's own node_exporter and smartctl_exporter
  # packages -- registers itself here rather than being
  # hardcoded above. Drop-in target discovery: add/remove files under
  # targets.d/ to add or remove exporters without editing this file or
  # restarting Prometheus. See targets.d/README.md and
  # `monitoring-add-exporter --help`.
  - job_name: file-sd
    file_sd_configs:
      - files:
          - /etc/prometheus/targets.d/*.yml
          - /etc/prometheus/targets.d/*.json
        refresh_interval: 30s
