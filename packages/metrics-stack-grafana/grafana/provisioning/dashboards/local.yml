# managed by metrics-stack-grafana
apiVersion: 1

providers:
  - name: local
    orgId: 1
    folder: Monitoring
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
